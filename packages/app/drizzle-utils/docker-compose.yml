services:
  postgres:
    image: postgres:18.4-alpine
    command: '-c full_page_writes=off -c fsync=off -c synchronous_commit=off'
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 5432']
      interval: 1s
      timeout: 5s
      retries: 10

  cockroachdb:
    image: cockroachdb/cockroach:latest-v26.2
    command: start-single-node --insecure
    ports:
      - '26257:26257'
    environment:
      - COCKROACH_DATABASE=test
    healthcheck:
      test: ['CMD', 'cockroach', 'sql', '--insecure', '-e', 'SELECT 1']
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8.4.8
    # MySQL 8.4 dropped --default-authentication-plugin; mysql_native_password is
    # also no longer loaded by default, so enable it explicitly for the test
    # clients (mysql2 connects as root with a native-password account).
    command: '--mysql-native-password=ON'
    ports:
      - '3306:3306'
    volumes:
      - ./test/fixtures/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - MYSQL_ROOT_PASSWORD=pass
      - MYSQL_DATABASE=test
    healthcheck:
      test: ['CMD', 'mysql', '-h', '127.0.0.1', '-u', 'root', '-ppass', '-e', 'SELECT 1']
      interval: 2s
      timeout: 5s
      retries: 30

# Pin an explicit small subnet so Docker doesn't allocate one from its default
# pool. Required on hosts where the default address pools are exhausted —
# Docker errors with "all predefined address pools have been fully subnetted"
# otherwise. The /28 is more than enough for three services.
networks:
  default:
    ipam:
      config:
        - subnet: 10.234.97.0/28
