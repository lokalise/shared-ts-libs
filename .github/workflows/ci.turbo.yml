name: CI (Turbo)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: CI / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --ignore-scripts

      - name: Restore Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ matrix.node-version }}-${{ github.head_ref || github.ref_name }}
          restore-keys: |
            turbo-${{ matrix.node-version }}-${{ github.head_ref || github.ref_name }}
            turbo-${{ matrix.node-version }}-main
            turbo-${{ matrix.node-version }}-

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:ci
